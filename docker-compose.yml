services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: battleborn
      POSTGRES_USER: battleborn
      POSTGRES_PASSWORD: battleborn
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleborn -d battleborn"]
      interval: 5s
      timeout: 5s
      retries: 12

  match-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run start --workspace @battleborn/match-service
    environment:
      PORT: 8787
      SESSION_TOKEN_SECRET: local-dev-secret
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run dev --workspace @battleborn/web -- --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      SESSION_TOKEN_SECRET: local-dev-secret
      NEXT_PUBLIC_MATCH_SERVICE_URL: ws://localhost:8787
      DATABASE_URL: postgres://battleborn:battleborn@postgres:5432/battleborn
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      match-service:
        condition: service_started
    ports:
      - "42070:42070"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next-cache:/app/apps/web/.next

volumes:
  postgres-data:
  node_modules:
  next-cache:
